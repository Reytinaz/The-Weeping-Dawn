name: Build multi-platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        build_type: [Release]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ─── SFML для Windows (статическая) ───
    - name: Cache SFML (Windows)
      if: runner.os == 'Windows'
      id: cache-sfml-win
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/sfml
        key: sfml-3.1.0-windows-static

    - name: Download SFML (Windows)
      if: runner.os == 'Windows' && steps.cache-sfml-win.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $url = "https://www.sfml-dev.org/files/SFML-3.1.0-windows-vc17-64-bit.zip"
        Invoke-WebRequest -Uri $url -OutFile sfml.zip
        Expand-Archive sfml.zip -DestinationPath ${{ github.workspace }}/sfml -Force
        Remove-Item sfml.zip

    # ─── SFML для Linux (динамическая) ───
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsfml-dev libharfbuzz-dev

    # ─── Конфигурация CMake ───
    - name: Configure CMake
      shell: pwsh
      run: |
        if ("${{ runner.os }}" -eq "Windows") {
          $sfmlDir = "${{ github.workspace }}\sfml\lib\cmake\SFML"
        } else {
          $sfmlDir = "/usr/lib/x86_64-linux-gnu/cmake/SFML"
        }
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSFML_DIR="$sfmlDir"

    # ─── Сборка ───
    - name: Build
      shell: pwsh
      run: cmake --build build --config ${{ matrix.build_type }}

    # ─── Артефакты ───
    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: TheWeepingDawn-Windows
        path: |
          TheWeepingDawn.exe
          assets/

    - name: Upload Linux artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: TheWeepingDawn-Linux
        path: |
          TheWeepingDawn
          assets/