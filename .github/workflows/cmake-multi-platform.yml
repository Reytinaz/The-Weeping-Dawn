name: Build multi-platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        build_type: [Release]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ─── SFML для Windows ─────────────────────────────────────
    - name: Download SFML (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $url = "https://www.sfml-dev.org/files/SFML-3.1.0-windows-vc17-64-bit.zip"
        Invoke-WebRequest -Uri $url -OutFile sfml.zip
        Expand-Archive sfml.zip -DestinationPath ${{ github.workspace }}/sfml -Force
        Remove-Item sfml.zip

    # ─── SFML для Linux ──────────────────────────────────────
    - name: Download SFML (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libharfbuzz-dev   # зависимости SFML
        wget -q https://www.sfml-dev.org/files/SFML-3.1.0-linux-gcc-64-bit.tar.gz
        tar -xzf SFML-3.1.0-linux-gcc-64-bit.tar.gz -C ${{ github.workspace }}/sfml --strip-components=1
        rm SFML-3.1.0-linux-gcc-64-bit.tar.gz

    # ─── Конфигурация CMake ──────────────────────────────────
    - name: Configure CMake
      shell: pwsh
      run: |
        $sfmlDir = Join-Path ${{ github.workspace }} "sfml/lib/cmake/SFML"
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSFML_DIR="$sfmlDir"

    # ─── Сборка ───────────────────────────────────────────────
    - name: Build
      shell: pwsh
      run: cmake --build build --config ${{ matrix.build_type }}

    # ─── Артефакты ────────────────────────────────────────────
    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: TheWeepingDawn-Windows
        path: |
          TheWeepingDawn.exe
          assets/

    - name: Upload Linux artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: TheWeepingDawn-Linux
        path: |
          TheWeepingDawn
          assets/