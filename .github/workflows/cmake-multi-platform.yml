name: Build multi-platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        build_type: [Release]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache SFML (Windows)
      if: runner.os == 'Windows'
      id: cache-sfml-win
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/sfml
        key: sfml-3.1.0-windows-vc17

    - name: Download SFML (Windows)
      if: runner.os == 'Windows' && steps.cache-sfml-win.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $url = "https://www.sfml-dev.org/files/SFML-3.1.0-windows-vc17-64-bit.zip"
        Invoke-WebRequest -Uri $url -OutFile sfml.zip
        Expand-Archive sfml.zip -DestinationPath ${{ github.workspace }}/sfml -Force
        Remove-Item sfml.zip
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\sfml\include\freetype2"

    - name: Cache SFML (Linux)
      if: runner.os == 'Linux'
      id: cache-sfml-linux
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/sfml
        key: sfml-3.1.0-linux-gcc-64

    - name: Download SFML (Linux)
      if: runner.os == 'Linux' && steps.cache-sfml-linux.outputs.cache-hit != 'true'
      run: |
        wget -q https://www.sfml-dev.org/files/SFML-3.1.0-linux-gcc-64-bit.tar.gz
        mkdir -p ${{ github.workspace }}/sfml
        tar -xzf SFML-3.1.0-linux-gcc-64-bit.tar.gz -C ${{ github.workspace }}/sfml --strip-components=1

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libharfbuzz-dev libfreetype6-dev libgl1-mesa-dev

    - name: Configure CMake
      shell: pwsh
      run: |
        if ($env:RUNNER_OS -eq 'Windows') {
            $sfmlDir = "${{ github.workspace }}\sfml\lib\cmake\SFML"
        } else {
            $sfmlDir = "${{ github.workspace }}/sfml/lib/cmake/SFML"
        }
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSFML_DIR="$sfmlDir"

    - name: Build
      shell: pwsh
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Prepare Windows artifact
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Copy-Item -Path "build\${{ matrix.build_type }}\TheWeepingDawn.exe" -Destination . -Force

    - name: Prepare Linux artifact
      if: runner.os == 'Linux'
      run: |
        cp build/TheWeepingDawn .

    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: TheWeepingDawn-Windows
        path: |
          TheWeepingDawn.exe
          assets/

    - name: Upload Linux artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: TheWeepingDawn-Linux
        path: |
          TheWeepingDawn
          assets/