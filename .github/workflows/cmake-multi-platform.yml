name: Build multi-platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        build_type: [Release]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache SFML (Windows)
      if: runner.os == 'Windows'
      id: cache-sfml-win
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/sfml
        key: sfml-3.1.0-windows-vc17-32bit

    - name: Download SFML (Windows)
      if: runner.os == 'Windows' && steps.cache-sfml-win.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $urls = @(
          "https://github.com/SFML/SFML/releases/download/3.1.0/SFML-3.1.0-windows-vc17-32-bit.zip",
          "https://www.sfml-dev.org/files/SFML-3.1.0-windows-vc17-32-bit.zip"
        )
        $downloaded = $false
        foreach ($url in $urls) {
          Write-Host "Trying to download SFML from $url"
          for ($i = 0; $i -lt 3; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile sfml.zip -TimeoutSec 120 -ErrorAction Stop
              $downloaded = $true
              break
            } catch {
              Write-Host "Attempt $($i+1) failed: $_"
              Start-Sleep -Seconds 2
            }
          }
          if ($downloaded) { break }
        }
        if (-not $downloaded) {
          Write-Error "Could not download SFML after several attempts"
          exit 1
        }
        Expand-Archive sfml.zip -DestinationPath ${{ github.workspace }}/sfml -Force
        Remove-Item sfml.zip

    - name: Cache SFML (Linux)
      if: runner.os == 'Linux'
      id: cache-sfml-linux
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/sfml
        key: sfml-3.1.0-linux-gcc-64

    - name: Download SFML (Linux)
      if: runner.os == 'Linux' && steps.cache-sfml-linux.outputs.cache-hit != 'true'
      run: |
        wget -q https://www.sfml-dev.org/files/SFML-3.1.0-linux-gcc-64-bit.tar.gz
        mkdir -p ${{ github.workspace }}/sfml
        tar -xzf SFML-3.1.0-linux-gcc-64-bit.tar.gz -C ${{ github.workspace }}/sfml --strip-components=1

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libharfbuzz-dev libfreetype6-dev libgl1-mesa-dev

    - name: Configure CMake
      shell: pwsh
      run: |
        if ($env:RUNNER_OS -eq 'Windows') {
            cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        } else {
            cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSFML_DIR="${{ github.workspace }}/sfml/lib/cmake/SFML"
        }

    - name: Build
      shell: pwsh
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Upload Windows artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: TheWeepingDawn-Windows
        path: |
          build/Release/TheWeepingDawn.exe
          assets/

    - name: Upload Linux artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: TheWeepingDawn-Linux
        path: |
          build/TheWeepingDawn
          assets/